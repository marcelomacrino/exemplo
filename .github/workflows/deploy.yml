name: Deploy para GitHub Pages 
  
# Trigger: executa quando ha push na branch main 
on: 
  push: 
    branches: [main] 
  
jobs: 
  deploy: 
    runs-on: ubuntu-latest 
  
    # Permissoes necessarias para o GitHub Pages 
    permissions: 
      contents: read 
      pages: write 
      id-token: write 
  
    # Vincula ao ambiente do GitHub Pages 
    environment: 
      name: github-pages 
      url: ${{ steps.deployment.outputs.page_url }} 
  
    steps: 
      # Passo 1: baixar o codigo 
      - name: Checkout do codigo 
        uses: actions/checkout@v4 
  
      # Passo 2 (opcional): varredura de vulnerabilidades 
      - name: Varredura de vulnerabilidades 
        run: npm audit --audit-level=high 
        continue-on-error: true 
  
      # Passo 3: preparar o GitHub Pages 
      - name: Configurar GitHub Pages 
        uses: actions/configure-pages@v5 
  
      # Passo 4: enviar os arquivos 
      - name: Upload dos arquivos 
        uses: actions/upload-pages-artifact@v3 
        with: 
          path: '.' 
  
      # Passo 5: publicar 
      - name: Deploy 
        id: deployment 
        uses: actions/deploy-pages@v4 
